name: Deploy

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Run migrations
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Run migrations
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx sequelize-cli db:migrate

  deploy:
    name: Deploy application
    runs-on: ubuntu-latest
    needs: migrate          # ← only runs if migrate job succeeds
    environment: production

    steps:
      - uses: actions/checkout@v4

      # Replace the step below with your actual deploy command,
      # e.g. docker push + ECS deploy, Railway, Render, Fly.io, etc.
      - name: Deploy
        run: echo "Deploy your app here"
